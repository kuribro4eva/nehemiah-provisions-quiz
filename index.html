<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebuild the Wall — Nehemiah 1-3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',Calibri,sans-serif;background:#0a1628;color:#fff;
  display:flex;align-items:center;justify-content:center;min-height:100vh}

.game-container{
  aspect-ratio:16/9;max-width:100vw;max-height:100vh;width:100%;
  display:grid;grid-template-columns:45% 55%;
  overflow:hidden;border-radius:12px;position:relative;
  background:#0a1628;
}
.game-container:fullscreen{border-radius:0;width:100vw;height:100vh;max-width:none;max-height:none}

/* Right panel (wall canvas) */
.wall-panel{position:relative;overflow:hidden}
.wall-panel canvas{display:block;width:100%;height:100%}

/* Left panel (questions) */
.right-panel{
  background:rgba(26,42,74,0.95);overflow-y:auto;padding:28px 24px;
  display:flex;flex-direction:column;position:relative;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.2) transparent;
}
.right-panel::-webkit-scrollbar{width:6px}
.right-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}

/* Top buttons */
.top-buttons{position:absolute;top:10px;right:10px;z-index:50;display:flex;gap:6px}
.top-btn{
  padding:6px 14px;border-radius:999px;border:none;cursor:pointer;
  font-size:.95rem;font-family:inherit;font-weight:700;
  background:#0D8B82;color:#fff;transition:all .2s;
}
.top-btn:hover{background:#066B67}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(calc(100vh + 20px)) rotate(720deg);opacity:0}}

.fade-up{animation:fadeUp .4s ease both}
.shake{animation:shake .4s ease}
.pop{animation:pop .3s ease}

/* Buttons */
.btn{display:inline-block;padding:18px 42px;border:none;border-radius:14px;
  font-family:inherit;font-size:1.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:#0D8B82;color:#fff}
.btn-primary:hover{background:#066B67}
.btn-secondary{background:rgba(13,139,130,0.2);color:#7eddd6;border:1px solid rgba(13,139,130,0.4)}
.btn-secondary:hover{background:rgba(13,139,130,0.35)}

/* Welcome */
.welcome-content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px 16px}
.welcome-content h1{font-size:4.8rem;font-weight:800;color:#fff;margin-bottom:6px}
.welcome-content .subtitle{font-size:2.4rem;color:#7eddd6;font-weight:600;margin-bottom:24px}
.welcome-content p{font-size:2.1rem;line-height:1.6;margin-bottom:32px;color:rgba(255,255,255,0.7);max-width:500px}

/* Round content */
.round-header{text-align:center;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.round-num{font-size:1.8rem;font-weight:700;color:#7eddd6;text-transform:uppercase;letter-spacing:1px}
.phase-label{font-size:2.4rem;font-weight:700;color:#fff;margin-top:2px}
.wrap-up-link{font-size:1.5rem;color:#aab;cursor:pointer;background:none;border:none;font-family:inherit;font-weight:600;opacity:0.7}
.wrap-up-link:hover{opacity:1;text-decoration:underline;color:#7eddd6}

.progress-wrap{width:100%;height:8px;background:rgba(255,255,255,0.1);border-radius:99px;margin-bottom:20px;overflow:hidden}
.progress-bar{height:100%;background:#0D8B82;border-radius:99px;transition:width .4s ease}

.scripture-box{background:#FBF4E4;border-left:5px solid #E07A5F;border-radius:0 8px 8px 0;
  padding:20px 22px;margin-bottom:22px;font-style:italic;line-height:1.6;font-size:2.1rem;color:#2C3E50}
.scripture-box .ref{display:block;margin-top:10px;font-style:normal;font-size:1.7rem;
  font-weight:700;color:#E07A5F}

.question-text{font-size:2.2rem;font-weight:700;margin-bottom:16px;line-height:1.45;color:#fff}

.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{
  width:100%;text-align:left;padding:16px 22px;border:2px solid rgba(13,139,130,0.3);
  border-radius:12px;background:rgba(30,52,84,0.8);font-family:inherit;font-size:2rem;
  cursor:pointer;transition:all .18s;line-height:1.4;font-weight:600;color:rgba(255,255,255,0.9);
}
.choice-btn:hover:not(.locked){border-color:#0D8B82;background:rgba(13,139,130,0.15)}
.choice-btn.correct{border-color:#0D8B82;background:rgba(13,139,130,0.25);color:#7eddd6}
.choice-btn.wrong{border-color:#E07A5F;background:rgba(224,122,95,0.15);color:#E07A5F}
.choice-btn.locked{cursor:default;opacity:.55}
.choice-btn.locked.correct{opacity:1}
.choice-btn.selected{border-color:#0D8B82;background:rgba(13,139,130,0.25);color:#7eddd6;opacity:1}

.choice-btn-d{border-style:dashed;opacity:0.8}
.fillin-box{background:rgba(13,139,130,0.1);border:2px solid rgba(13,139,130,0.3);border-radius:12px;padding:20px 24px;margin-top:14px}
.fillin-prefix{font-size:1.7rem;color:rgba(255,255,255,0.85);line-height:2.4}
.fillin-input-wrap{display:inline-block;margin:6px 0}
.fillin-input{background:rgba(255,255,255,0.1);border:2px solid #0D8B82;border-radius:8px;color:#fff;font-size:1.6rem;padding:8px 14px;width:100%;max-width:400px;font-family:inherit;outline:none}
.fillin-input:focus{border-color:#7eddd6;background:rgba(255,255,255,0.15)}
.fillin-input:disabled{opacity:0.6;border-color:#555}
.fillin-counter{display:block;font-size:1.1rem;margin-top:3px;color:rgba(255,255,255,0.4)}
.fillin-submit-wrap{text-align:center;margin-top:14px}

.feedback{margin-top:18px;padding:16px 20px;border-radius:10px;font-weight:600;font-size:1.9rem;
  display:none;text-align:center}
.feedback.show{display:block;animation:fadeUp .3s ease both}
.feedback.correct-fb{background:rgba(13,139,130,0.2);color:#7eddd6}
.feedback.wrong-fb{background:rgba(224,122,95,0.15);color:#E07A5F}

.next-btn-wrap{text-align:center;margin-top:20px}

/* Results + Wrap Up shared */
.results-content,.wrapup-content{flex:1;display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.results-content h2,.wrapup-content h2{font-size:4.5rem;font-weight:800;color:#fff;margin-bottom:14px;text-align:center}
.closing-para{font-size:2rem;line-height:1.6;color:rgba(255,255,255,0.78);margin-bottom:20px;text-align:left}
.closing-para b{color:rgba(255,255,255,0.95)}
.missed-line{font-size:1.8rem;color:rgba(255,255,255,0.45);margin-bottom:16px;font-style:italic;text-align:center}
.recap-heading{font-size:2.2rem;font-weight:700;color:#7eddd6;margin-bottom:14px}
.recap-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.recap-pill{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:24px;
  background:rgba(13,139,130,0.18);border:1px solid rgba(13,139,130,0.35);font-size:1.9rem;font-weight:600;color:#7eddd6}
.results-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* Confetti */
.confetti-piece{position:fixed;top:-20px;width:10px;height:10px;border-radius:2px;
  animation:confettiFall linear forwards;pointer-events:none;z-index:9999}

@media(max-width:900px){
  body{overflow:auto}
  .game-container{
    aspect-ratio:auto;grid-template-columns:1fr;grid-template-rows:1fr 40vh;
    max-height:none;height:auto;min-height:100vh;border-radius:0;
  }
  .right-panel{order:-1}
}
</style>
</head>

/* ===== SOUND ENGINE ===== */
var SND = {
  ctx: null,
  enabled: true,

  init: function() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },

  play: function(freq, type, duration, rampTo) {
    if (!this.enabled || !this.ctx) return;
    var osc = this.ctx.createOscillator();
    var gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    if (rampTo) osc.frequency.linearRampToValueAtTime(rampTo, this.ctx.currentTime + duration);
    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.start(this.ctx.currentTime);
    osc.stop(this.ctx.currentTime + duration);
  },

  click: function() { this.play(800, 'sine', 0.05); },

  correct: function() {
    this.play(523, 'sine', 0.15);
    setTimeout(function() { SND.play(659, 'sine', 0.2); }, 100);
  },

  wrong: function() { this.play(150, 'sawtooth', 0.25); },

  stoneDrop: function() { this.play(300, 'triangle', 0.25, 80); },

  torchLight: function() {
    if (!this.enabled || !this.ctx) return;
    var bufferSize = this.ctx.sampleRate * 0.06;
    var buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    var noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    var gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
    noise.connect(gain);
    gain.connect(this.ctx.destination);
    noise.start();
    setTimeout(function() { SND.play(440, 'sine', 0.12); }, 50);
  },

  sunrise: function() {
    var notes = [262, 330, 392, 523];
    notes.forEach(function(n, i) {
      setTimeout(function() { SND.play(n, 'sine', 0.25); }, i * 150);
    });
  },

  confetti: function() {
    for (var i = 0; i < 8; i++) {
      (function(delay) {
        setTimeout(function() { SND.play(800 + Math.random() * 1200, 'sine', 0.08); }, delay);
      })(i * 60);
    }
  }
};

/* ===== HELPERS ===== */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function esc(s) { return encodeURIComponent(s); }
function unesc(s) { return decodeURIComponent(s); }

/* ===== FULLSCREEN ===== */
function toggleFullscreen() {
  var el = document.getElementById('game-container');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

function onFullscreenChange() {
  resizeCanvas();
}
document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

function toggleSound() {
  SND.enabled = !SND.enabled;
  document.getElementById('sound-btn').innerHTML = SND.enabled ? '&#x1F50A;' : '&#x1F507;';
}

/* ===== CANVAS ===== */
var canvas, ctx, canvasW, canvasH;

function resizeCanvas() {
  canvas = document.getElementById('wall-canvas');
  if (!canvas) return;
  var rect = canvas.parentElement.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvasW = rect.width;
  canvasH = rect.height;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function wrapText(c, text, x, y, maxWidth, lineHeight) {
  var words = text.split(' ');
  var line = '';
  var lines = [];
  for (var n = 0; n < words.length; n++) {
    var testLine = line + words[n] + ' ';
    if (c.measureText(testLine).width > maxWidth && n > 0) {
      lines.push(line.trim());
      line = words[n] + ' ';
    } else {
      line = testLine;
    }
  }
  lines.push(line.trim());
  var startY = y - ((lines.length - 1) * lineHeight) / 2;
  for (var i = 0; i < lines.length; i++) {
    c.fillText(lines[i], x, startY + i * lineHeight);
  }
}

function drawScene() {
  if (!ctx) return;
  var W = canvasW, H = canvasH;
  state.frameCount++;

  // 1. Night sky gradient
  var skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0a1628');
  skyGrad.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Sunrise (when all 9 complete)
  if (state.sunriseFrame > 0) {
    var sp = Math.min(state.sunriseFrame / 60, 1);
    var foundationTop = H * 0.88 - H * 0.06;
    // Wall area
    var wallLeft = W * 0.1;
    var wallRight = W * 0.9;
    var wallMidX = (wallLeft + wallRight) / 2;
    // Rows
    var slotAreaTop = foundationTop - (H * 0.58); // approx top of top row
    var sunCenterY = slotAreaTop - 10;

    // Warm gradient behind wall
    var sunGrad = ctx.createRadialGradient(wallMidX, sunCenterY, 0, wallMidX, sunCenterY, W * 0.5);
    sunGrad.addColorStop(0, 'rgba(255,107,53,' + (0.5 * sp) + ')');
    sunGrad.addColorStop(0.3, 'rgba(255,215,0,' + (0.3 * sp) + ')');
    sunGrad.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(0, 0, W, H);

    // Light rays
    var rayCount = 6;
    for (var ri = 0; ri < rayCount; ri++) {
      var angle = -Math.PI / 2 + (ri - (rayCount - 1) / 2) * 0.28;
      var rayLen = H * 0.45 * sp;
      ctx.save();
      ctx.globalAlpha = 0.18 * sp;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.moveTo(wallMidX, sunCenterY);
      ctx.lineTo(wallMidX + Math.cos(angle - 0.04) * rayLen, sunCenterY + Math.sin(angle) * rayLen);
      ctx.lineTo(wallMidX + Math.cos(angle + 0.04) * rayLen, sunCenterY + Math.sin(angle) * rayLen);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    if (state.sunriseFrame < 60) state.sunriseFrame++;
  }

  // 2. Stars
  for (var si = 0; si < stars.length; si++) {
    var s = stars[si];
    var opacity = 0.4 + 0.6 * Math.abs(Math.sin(state.frameCount * 0.02 + s.seed));
    if (state.sunriseFrame > 30) opacity *= Math.max(0, 1 - (state.sunriseFrame - 30) / 30);
    ctx.fillStyle = 'rgba(255,255,255,' + opacity + ')';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 3. Ground
  var groundH = H * 0.12;
  var groundY = H - groundH;
  ctx.fillStyle = '#8B7355';
  ctx.fillRect(0, groundY, W, groundH);
  ctx.fillStyle = '#6B5B45';
  ctx.fillRect(0, groundY, W, 2);

  // 4. Wall foundation
  var foundH = H * 0.06;
  var foundY = groundY - foundH;
  var foundLeft = W * 0.1;
  var foundW = W * 0.8;
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(foundLeft, foundY, foundW, foundH);

  // 5. Stone slots (3 cols x 3 rows)
  var cols = 3, rows = 3;
  var slotGap = 4;
  var slotAreaH = H * 0.52;
  var slotAreaY = foundY - slotAreaH;

  // Fix column sizing: use symmetric calculation
  var wallAreaX = foundLeft;
  var wallAreaW = foundW;
  var totalGapW = slotGap * (cols - 1);
  var cellW = (wallAreaW - totalGapW) / cols;
  var cellH = (slotAreaH - slotGap * (rows - 1)) / rows;

  for (var i = 0; i < 9; i++) {
    var col = i % 3;
    var row = Math.floor(i / 3);
    var drawRow = 2 - row; // bottom row = rounds 0-2
    var sx = wallAreaX + col * (cellW + slotGap);
    var sy = slotAreaY + drawRow * (cellH + slotGap);
    var res = state.results[i];

    // Check if this slot is being animated
    var isAnimating = state.anim && state.anim.round === i;
    var animProgress = 0;

    if (isAnimating) {
      animProgress = Math.min(state.anim.frame / state.anim.maxFrames, 1);
    }

    var showAsStone = (res && res.completed) || state.showAllProvisions;
    if (showAsStone) {
      var sw = cellW;
      var sh = cellH;
      var stoneX = sx;
      var targetY = sy;
      var stoneY = targetY;

      if (isAnimating) {
        var eased = 1 - Math.pow(1 - animProgress, 3);
        stoneY = (targetY - 60) + 60 * eased;
      }

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      roundRect(ctx, stoneX + 3, stoneY + 3, sw, sh, 4);
      ctx.fill();

      // Stone body - uniform warm sandstone
      ctx.fillStyle = '#C4A56B';
      roundRect(ctx, stoneX, stoneY, sw, sh, 4);
      ctx.fill();

      // Stone texture: subtle gradient overlay (lighter top, darker bottom)
      var stoneGrad = ctx.createLinearGradient(stoneX, stoneY, stoneX, stoneY + sh);
      stoneGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
      stoneGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
      stoneGrad.addColorStop(1, 'rgba(0,0,0,0.1)');
      ctx.fillStyle = stoneGrad;
      roundRect(ctx, stoneX, stoneY, sw, sh, 4);
      ctx.fill();

      // Mortar lines (horizontal cracks)
      ctx.strokeStyle = 'rgba(80,60,40,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(stoneX + 6, stoneY + sh * 0.3);
      ctx.lineTo(stoneX + sw - 6, stoneY + sh * 0.3);
      ctx.moveTo(stoneX + 10, stoneY + sh * 0.55);
      ctx.lineTo(stoneX + sw - 10, stoneY + sh * 0.55);
      ctx.moveTo(stoneX + 8, stoneY + sh * 0.75);
      ctx.lineTo(stoneX + sw - 8, stoneY + sh * 0.75);
      ctx.stroke();

      // Edge weathering (darker inset border)
      ctx.strokeStyle = 'rgba(80,60,40,0.2)';
      ctx.lineWidth = 1.5;
      roundRect(ctx, stoneX + 1, stoneY + 1, sw - 2, sh - 2, 3);
      ctx.stroke();

      // Outer border
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      roundRect(ctx, stoneX, stoneY, sw, sh, 4);
      ctx.stroke();

      // Stone text: provision label + sentence
      var stoneLabel;
      if (res && res.completed && res.appChoice === 3 && res.customText) {
        stoneLabel = res.customText;
      } else if (res && res.completed && res.appChoice >= 0 && res.appChoice < 3) {
        stoneLabel = STONE_TEXT[i][res.appChoice];
      } else {
        stoneLabel = STONE_DEFAULT[i];
      }
      var labelSize = Math.max(18, Math.min(28, sw / 3.5));
      var labelH = labelSize + 4;

      // Provision label - fixed position at top of stone
      var labelY = stoneY + sh * 0.09;
      ctx.fillStyle = '#3D2B1F';
      ctx.font = '800 ' + labelSize + 'px Nunito, Calibri, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(PROV_SHORT[i], stoneX + sw / 2, labelY);

      // Sentence - auto-shrink font until it fits in available space
      var sentTop = labelY + labelH + 6;
      var sentAvailH = (stoneY + sh - sh * 0.08) - sentTop;
      var maxWrap = sw - 16;
      var fontSize = Math.min(30, sw / 3.3);
      var sentLines, lineH;
      // Shrink loop: reduce font until text block fits vertically
      for (; fontSize >= 10; fontSize -= 1) {
        lineH = fontSize + 3;
        ctx.font = '700 ' + fontSize + 'px Nunito, Calibri, sans-serif';
        var words = stoneLabel.split(' ');
        sentLines = [];
        var cur = '';
        for (var wi = 0; wi < words.length; wi++) {
          var word = words[wi];
          // Break long words that exceed line width by themselves
          if (ctx.measureText(word).width > maxWrap) {
            if (cur.trim()) { sentLines.push(cur.trim()); cur = ''; }
            var chunk = '';
            for (var ci = 0; ci < word.length; ci++) {
              if (ctx.measureText(chunk + word[ci]).width > maxWrap && chunk) {
                sentLines.push(chunk);
                chunk = word[ci];
              } else {
                chunk += word[ci];
              }
            }
            cur = chunk + ' ';
          } else {
            var test = cur + word + ' ';
            if (ctx.measureText(test).width > maxWrap && cur.trim()) {
              sentLines.push(cur.trim());
              cur = word + ' ';
            } else {
              cur = test;
            }
          }
        }
        if (cur.trim()) sentLines.push(cur.trim());
        if (sentLines.length * lineH <= sentAvailH) break;
      }

      // Draw sentence centered in available space
      var sentBlockH = sentLines.length * lineH;
      var sentStartY = sentTop + (sentAvailH - sentBlockH) / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.font = '700 ' + fontSize + 'px Nunito, Calibri, sans-serif';
      for (var li = 0; li < sentLines.length; li++) {
        ctx.fillText(sentLines[li], stoneX + sw / 2, sentStartY + li * lineH);
      }
    } else {
      // Empty slot - dotted outline
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      roundRect(ctx, sx + 4, sy + 4, cellW - 8, cellH - 8, 5);
      ctx.stroke();
      ctx.setLineDash([]);

      // Show provision name in faint text during wrap-up, else "Round N"
      if (state.showAllProvisions) {
        ctx.fillStyle = '#667';
        var provFontSize = Math.max(8, Math.min(10, cellW / 12));
        ctx.font = '600 ' + provFontSize + 'px Nunito, Calibri, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        wrapText(ctx, PROVISIONS[i], sx + cellW / 2, sy + cellH / 2, cellW - 16, provFontSize + 2);
      } else {
        ctx.fillStyle = '#666';
        ctx.font = '600 ' + Math.max(9, Math.min(11, cellW / 10)) + 'px Nunito, Calibri, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Round ' + (i + 1), sx + cellW / 2, sy + cellH / 2);
      }
    }
  }

  // 6. Torches (along top of wall)
  var torchY = slotAreaY - 12;
  for (var ti = 0; ti < 9; ti++) {
    var tx = foundLeft + (ti + 0.5) * (foundW / 9);
    var lit = (state.results[ti] && state.results[ti].completed) || state.showAllProvisions;

    // Stick
    ctx.fillStyle = lit ? '#8B6914' : '#666';
    ctx.fillRect(tx - 2, torchY - 16, 4, 20);

    if (lit) {
      // Flame
      var flicker1 = Math.sin(state.frameCount * 0.12 + ti * 1.7) * 2;
      var flicker2 = Math.cos(state.frameCount * 0.09 + ti * 2.3) * 1.5;

      // Glow
      var glow = ctx.createRadialGradient(tx + flicker1 * 0.3, torchY - 22, 2, tx, torchY - 18, 28);
      glow.addColorStop(0, 'rgba(255,140,0,0.25)');
      glow.addColorStop(1, 'rgba(255,140,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(tx, torchY - 18, 28, 0, Math.PI * 2);
      ctx.fill();

      // Inner flame (yellow)
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.ellipse(tx + flicker1 * 0.5, torchY - 22 + flicker2 * 0.3, 3, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Outer flame (orange)
      ctx.fillStyle = '#ff8c00';
      ctx.beginPath();
      ctx.ellipse(tx + flicker1, torchY - 25 + flicker2, 4, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Top flame tip
      ctx.fillStyle = 'rgba(255,200,50,0.7)';
      ctx.beginPath();
      ctx.ellipse(tx + flicker2, torchY - 30 + flicker1 * 0.5, 2, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Unlit head
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.arc(tx, torchY - 18, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 7. Dust particles
  for (var di = state.dust.length - 1; di >= 0; di--) {
    var d = state.dust[di];
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.15; // gravity
    d.life++;
    var alpha = 1 - d.life / d.maxLife;
    if (alpha <= 0) {
      state.dust.splice(di, 1);
      continue;
    }
    ctx.fillStyle = 'rgba(184,149,106,' + alpha + ')';
    ctx.beginPath();
    ctx.arc(d.x, d.y, 2 + (1 - alpha) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Advance animation
  if (state.anim) {
    state.anim.frame++;
    if (state.anim.frame >= state.anim.maxFrames) {
      // Landing - spawn dust
      var ai = state.anim.round;
      var acol = ai % 3;
      var arow = Math.floor(ai / 3);
      var adrawRow = 2 - arow;
      var asx = wallAreaX + acol * (cellW + slotGap);
      var asy = slotAreaY + adrawRow * (cellH + slotGap);
      var centerX = asx + cellW / 2;
      var centerY = asy + cellH;
      for (var dp = 0; dp < 8; dp++) {
        state.dust.push({
          x: centerX + (Math.random() - 0.5) * cellW * 0.6,
          y: centerY,
          vx: (Math.random() - 0.5) * 3,
          vy: -Math.random() * 3 - 1,
          life: 0,
          maxLife: 20
        });
      }
      state.anim = null;
      // Post-animation callback
      if (state._animCallback) {
        var cb = state._animCallback;
        state._animCallback = null;
        setTimeout(cb, 200);
      }
    }
  }
}

function animLoop() {
  drawScene();
  requestAnimationFrame(animLoop);
}

/* ===== SCREEN RENDERING ===== */
var panel = null;

function renderWelcome() {
  state.screen = 'welcome';
  state.showAllProvisions = false;
  panel.innerHTML =
    '<div class="welcome-content fade-up">' +
      '<h1>Rebuild the Wall</h1>' +
      '<div class="subtitle">Nehemiah 1&ndash;3</div>' +
      '<p>Nehemiah heard that Jerusalem\u2019s walls were broken down \u2014 and he decided to do something about it. But first, God provided everything he needed.<br><br>' +
      'Can you spot God\u2019s provisions? Answer correctly to lay strong stones and rebuild the wall!</p>' +
      '<button class="btn btn-primary" onclick="startGame()">Start Building</button>' +
    '</div>';
}

function startGame() {
  SND.init();
  state.round = 0;
  state.sunriseFrame = 0;
  state.showAllProvisions = false;
  initResults();
  showRound();
}

function showRound() {
  state.screen = 'playing';
  state.phase = 'A';
  state.attempts = 0;
  state.phaseALocked = false;
  state.showAllProvisions = false;
  renderPhaseA();
}

function buildHeaderLinks() {
  var completedCount = 0;
  for (var ci = 0; ci < state.results.length; ci++) { if (state.results[ci].completed) completedCount++; }
  var links = '';
  if (completedCount >= 1) {
    links += '<button class="wrap-up-link" onclick="showWrapUp()">Wrap Up</button>';
  }
  return links;
}

function renderPhaseA() {
  var r = ROUNDS[state.round];
  var choices = shuffle([r.correct].concat(r.wrong));
  var pct = Math.round((state.round / 9) * 100);

  var headerLinks = buildHeaderLinks();

  var html = '<div class="fade-up">' +
    '<div class="progress-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
    '<div class="round-header">' +
      '<div><div class="round-num">Round ' + (state.round + 1) + ' of 9</div>' +
      '<div class="phase-label">What did God provide?</div></div>' +
      '<div>' + headerLinks + '</div>' +
    '</div>' +
    '<div class="scripture-box">' +
      r.scripture +
      '<span class="ref">&mdash; ' + r.ref + '</span>' +
    '</div>' +
    '<div class="choices" id="choices-a">';

  for (var i = 0; i < choices.length; i++) {
    html += '<button class="choice-btn" data-val="' + esc(choices[i]) + '" onclick="pickA(this)">' + choices[i] + '</button>';
  }

  html += '</div>' +
    '<div class="feedback" id="feedback-a"></div>' +
    '<div class="next-btn-wrap" id="next-a" style="display:none">' +
      '<button class="btn btn-primary" onclick="goPhaseB()">Next &rarr;</button>' +
    '</div></div>';

  panel.innerHTML = html;
}

function pickA(btn) {
  if (state.phaseALocked) return;
  SND.init();
  state.attempts++;
  var val = unesc(btn.getAttribute('data-val'));
  var r = ROUNDS[state.round];
  var fb = document.getElementById('feedback-a');
  var allBtns = document.querySelectorAll('#choices-a .choice-btn');

  if (val === r.correct) {
    state.phaseALocked = true;
    SND.correct();
    btn.classList.add('correct', 'pop');
    for (var i = 0; i < allBtns.length; i++) {
      if (allBtns[i] !== btn) allBtns[i].classList.add('locked');
    }
    fb.textContent = "That\u2019s right! God provided exactly what was needed.";
    fb.className = 'feedback show correct-fb';
    state.results[state.round].attempts = state.attempts;
    document.getElementById('next-a').style.display = 'block';
  } else {
    SND.wrong();
    btn.classList.add('wrong', 'shake', 'locked');

    var remaining = 0;
    for (var i = 0; i < allBtns.length; i++) {
      if (!allBtns[i].classList.contains('locked')) remaining++;
    }

    if (remaining <= 1) {
      state.phaseALocked = true;
      state.results[state.round].attempts = state.attempts;
      for (var i = 0; i < allBtns.length; i++) {
        var v = unesc(allBtns[i].getAttribute('data-val'));
        if (v === r.correct) {
          allBtns[i].classList.add('correct', 'pop');
        } else {
          allBtns[i].classList.add('locked');
        }
      }
      fb.textContent = 'The answer was: ' + r.correct;
      fb.className = 'feedback show wrong-fb';
      document.getElementById('next-a').style.display = 'block';
    } else {
      fb.textContent = "Not quite \u2014 try again!";
      fb.className = 'feedback show wrong-fb';
    }
  }
}

function goPhaseB() {
  state.phase = 'B';
  renderPhaseB();
}

function renderPhaseB() {
  var r = ROUNDS[state.round];
  var pct = Math.round(((state.round + 0.5) / 9) * 100);
  var labels = ['A', 'B', 'C'];

  var headerLinks = buildHeaderLinks();

  var html = '<div class="fade-up">' +
    '<div class="progress-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
    '<div class="round-header">' +
      '<div><div class="round-num">Round ' + (state.round + 1) + ' of 9</div>' +
      '<div class="phase-label">Life Connection</div></div>' +
      '<div>' + headerLinks + '</div>' +
    '</div>' +
    '<div class="question-text">' + r.appQ + '</div>' +
    '<div class="choices" id="choices-b">';

  for (var i = 0; i < r.appOpts.length; i++) {
    html += '<button class="choice-btn" data-idx="' + i + '" onclick="pickB(this,' + i + ')">' + labels[i] + ') ' + r.appOpts[i] + '</button>';
  }
  html += '<button class="choice-btn choice-btn-d" data-idx="3" onclick="pickD()">D) My own answer</button>';

  html += '</div>' +
    '<div id="fillin-area" style="display:none"></div>' +
    '<div class="next-btn-wrap" id="next-b" style="display:none">' +
      '<button class="btn btn-primary" onclick="finishRound()">Continue Building &rarr;</button>' +
    '</div></div>';

  panel.innerHTML = html;
}

function pickB(btn, idx) {
  SND.init();
  SND.click();
  var allBtns = document.querySelectorAll('#choices-b .choice-btn');
  for (var i = 0; i < allBtns.length; i++) {
    allBtns[i].classList.remove('selected', 'locked');
  }
  btn.classList.add('selected');
  for (var i = 0; i < allBtns.length; i++) {
    if (allBtns[i] !== btn) allBtns[i].classList.add('locked');
  }
  state.results[state.round].appChoice = idx;
  state.results[state.round].completed = true;
  state.results[state.round].customText = '';
  document.getElementById('fillin-area').style.display = 'none';
  document.getElementById('fillin-area').innerHTML = '';
  document.getElementById('next-b').style.display = 'block';
}

function pickD() {
  SND.init();
  SND.click();
  var allBtns = document.querySelectorAll('#choices-b .choice-btn');
  for (var i = 0; i < allBtns.length; i++) {
    allBtns[i].classList.remove('selected');
    if (allBtns[i].dataset.idx !== '3') allBtns[i].classList.add('locked');
  }
  var dBtn = document.querySelector('.choice-btn-d');
  if (dBtn) dBtn.classList.add('selected');

  var tmpl = STONE_TEMPLATES[state.round];
  var html = '<div class="fillin-box">';
  for (var b = 0; b < tmpl.blanks.length; b++) {
    if (b === 0) html += '<span class="fillin-prefix">' + tmpl.parts[0] + '</span>';
    html += '<div class="fillin-input-wrap">' +
      '<input type="text" class="fillin-input" id="blank-' + b + '" placeholder="' + tmpl.blanks[b].hint + '" maxlength="' + tmpl.blanks[b].max + '" oninput="checkBlanks()">' +
      '<span class="fillin-counter" id="counter-' + b + '">0 / ' + tmpl.blanks[b].max + ' characters</span>' +
    '</div>';
    html += '<span class="fillin-prefix">' + tmpl.parts[b + 1] + '</span>';
  }
  html += '</div>' +
    '<div class="fillin-submit-wrap" id="fillin-submit" style="display:none">' +
      '<button class="btn btn-primary" onclick="submitD()">Lock It In</button>' +
    '</div>';
  document.getElementById('fillin-area').innerHTML = html;
  document.getElementById('fillin-area').style.display = 'block';
  document.getElementById('next-b').style.display = 'none';
  // Clear any previous MC selection
  state.results[state.round].appChoice = -1;
  state.results[state.round].completed = false;
}

function checkBlanks() {
  var tmpl = STONE_TEMPLATES[state.round];
  var allValid = true;
  for (var b = 0; b < tmpl.blanks.length; b++) {
    var input = document.getElementById('blank-' + b);
    var counter = document.getElementById('counter-' + b);
    var charCount = input.value.trim().length;
    var max = tmpl.blanks[b].max;
    counter.textContent = charCount + ' / ' + max + ' characters';
    if (charCount > max) {
      counter.style.color = '#ff6b6b';
      allValid = false;
    } else if (charCount === 0) {
      counter.style.color = 'rgba(255,255,255,0.4)';
      allValid = false;
    } else {
      counter.style.color = '#7eddd6';
    }
  }
  var submitWrap = document.getElementById('fillin-submit');
  if (submitWrap) submitWrap.style.display = allValid ? 'block' : 'none';
}

function submitD() {
  SND.click();
  var tmpl = STONE_TEMPLATES[state.round];
  var sentence = '';
  for (var b = 0; b < tmpl.blanks.length; b++) {
    sentence += tmpl.parts[b];
    var val = document.getElementById('blank-' + b).value.trim();
    sentence += val;
  }
  sentence += tmpl.parts[tmpl.parts.length - 1];
  // Clean up double spaces
  sentence = sentence.replace(/\s+/g, ' ').trim();
  // Ensure it ends with a period
  if (sentence.charAt(sentence.length - 1) !== '.') sentence += '.';

  state.results[state.round].appChoice = 3;
  state.results[state.round].customText = sentence;
  state.results[state.round].completed = true;

  // Lock the inputs
  var inputs = document.querySelectorAll('.fillin-input');
  for (var i = 0; i < inputs.length; i++) inputs[i].disabled = true;
  document.getElementById('fillin-submit').style.display = 'none';
  document.getElementById('next-b').style.display = 'block';
}

function finishRound() {
  // Start stone-drop animation
  state.anim = { round: state.round, frame: 0, maxFrames: 25 };
  SND.stoneDrop();

  var thisRound = state.round;
  state._animCallback = function() {
    SND.torchLight();
    setTimeout(function() {
      state.round++;
      if (state.round >= 9) {
        SND.sunrise();
        state.sunriseFrame = 1;
        setTimeout(function() { showResults(); }, 300);
      } else {
        showRound();
      }
    }, 400);
  };
}

/* ===== SHARED ENDING HELPERS ===== */
var CLOSING_PARA = 'Nehemiah prayed earnestly and <b>God provided everything he needed</b>: news of Jerusalem\u2019s condition, access to God through prayer, wisdom from His Word, courage to speak, favor with the king, letters for safe passage, timber and materials, an armed escort, and a united workforce. <b>God gives His people what they need for the work He calls them to do.</b> Because of Jesus, we have access to God and all His blessings. Through prayer we can connect with God and ask for His provision. Prayer is an incredible privilege!';

function buildRecapPills() {
  var pills = '';
  for (var i = 0; i < 9; i++) {
    var res = state.results[i];
    if (res.completed && res.appChoice >= 0) {
      var pillText;
      if (res.appChoice === 3 && res.customText) {
        // Truncate custom text to first 6 words for pill
        var cwords = res.customText.split(' ');
        pillText = cwords.length > 6 ? cwords.slice(0, 6).join(' ') + '\u2026' : res.customText;
      } else if (res.appChoice < 3) {
        pillText = RECAP_SHORT[i][res.appChoice];
      }
      if (pillText) pills += '<span class="recap-pill">' + pillText + '</span>';
    }
  }
  return pills;
}

function buildMissedLine() {
  var missed = [];
  for (var i = 0; i < 9; i++) {
    if (!state.results[i].completed) missed.push(PROVISIONS[i].toLowerCase());
  }
  if (missed.length === 0) return '';
  return '<p class="missed-line">You didn\u2019t get to ' + missed.join(', ') + ' \u2014 but God provided those for Nehemiah too.</p>';
}

function buildEndingHtml(title, showMissed) {
  var completed = 0;
  for (var i = 0; i < state.results.length; i++) {
    if (state.results[i].completed) completed++;
  }
  var allDone = (completed === 9);

  var btnsHtml;
  if (allDone) {
    btnsHtml = '<button class="btn btn-primary" onclick="resetGame()">Play Again</button>';
  } else {
    btnsHtml = '<button class="btn btn-primary" onclick="keepBuilding()">Keep Building</button>' +
               '<button class="btn btn-secondary" onclick="resetGame()">Start Over</button>';
  }

  var html = '<h2>' + title + '</h2>' +
    '<p class="closing-para">' + CLOSING_PARA + '</p>';

  if (showMissed) html += buildMissedLine();

  if (completed > 0) {
    html += '<div class="recap-heading">What you decided to apply this week:</div>' +
      '<div class="recap-grid">' + buildRecapPills() + '</div>';
  }

  html += '<div class="results-btns">' + btnsHtml + '</div>';
  return html;
}

/* ===== RESULTS ===== */
function showResults() {
  state.screen = 'results';
  state.showAllProvisions = false;

  var completed = 0;
  for (var i = 0; i < state.results.length; i++) {
    if (state.results[i].completed) completed++;
  }
  var allDone = (completed === 9);
  var title = allDone ? 'Wall Complete!' : 'Your Wall So Far';

  panel.innerHTML = '<div class="results-content fade-up">' +
    buildEndingHtml(title, !allDone) + '</div>';

  if (allDone) {
    setTimeout(launchConfetti, 400);
    setTimeout(function() { SND.confetti(); }, 500);
  }
}

function keepBuilding() {
  state.showAllProvisions = false;
  state.sunriseFrame = 0;
  var next = -1;
  for (var i = 0; i < state.results.length; i++) {
    if (!state.results[i].completed) { next = i; break; }
  }
  if (next === -1) { showResults(); return; }
  state.round = next;
  showRound();
}

function resetGame() {
  state.sunriseFrame = 0;
  state.showAllProvisions = false;
  renderWelcome();
}

/* ===== WRAP UP ===== */
function showWrapUp() {
  state.screen = 'wrapup';
  state.showAllProvisions = true;
  state.sunriseFrame = 1;
  SND.sunrise();

  panel.innerHTML = '<div class="wrapup-content fade-up">' +
    buildEndingHtml('God\u2019s Provision Is Complete', false) + '</div>';

  setTimeout(launchConfetti, 600);
  setTimeout(function() { SND.confetti(); }, 700);
}

/* ===== CONFETTI ===== */
function launchConfetti() {
  var colors = ['#0D8B82', '#E07A5F', '#ffd700', '#7eddd6', '#B8956A', '#fff'];
  for (var i = 0; i < 80; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 1.5) + 's';
    el.style.borderRadius = (Math.random() > 0.5 ? '50%' : '2px');
    document.body.appendChild(el);
    (function(elem) {
      setTimeout(function() { if (elem.parentNode) elem.parentNode.removeChild(elem); }, 5500);
    })(el);
  }
}

/* ===== INIT ===== */
window.addEventListener('load', function() {
  panel = document.getElementById('right-panel');
  initResults();
  resizeCanvas();
  renderWelcome();
  animLoop();
});

window.addEventListener('resize', function() {
  resizeCanvas();
});
</script>
</body>
</html>
